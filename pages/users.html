<div class="page" id="page-users">
  <div class="card-header" style="background:var(--white); border-radius:var(--radius) var(--radius) 0 0; padding:20px 24px; border:1px solid var(--border); border-bottom:none; display:flex; justify-content:space-between; align-items:center;">
    <h3 style="font-family:'Syne',sans-serif;font-size:16px;">Manajemen Pengguna</h3>
    <button class="btn btn-primary-btn" id="btn-add-user">➕ Tambah Pengguna</button>
  </div>
  <div class="table-wrap" style="background:var(--white); border:1px solid var(--border); border-radius:0 0 var(--radius) var(--radius);">
    <table>
      <thead><tr><th>Nama</th><th>Email</th><th>Role</th><th>Status</th></tr></thead>
      <tbody id="users-body"></tbody>
    </table>
  </div>
</div>
