<div class="page" id="page-tasks">
  <div style="display:grid; grid-template-columns:1fr 300px; gap:24px;">
    <div>
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px">
        <h3 style="font-family:'Syne',sans-serif;font-size:16px;">Daftar Tugas</h3>
        <button class="btn btn-primary-btn" id="btn-new-task" style="display:none">➕ Buat Tugas</button>
      </div>
      <div id="tasks-list"></div>
    </div>
    <div class="content-card">
      <div class="card-header"><span class="card-title">Statistik</span></div>
      <div class="card-body" id="tasks-progress"></div>
    </div>
  </div>
</div>
