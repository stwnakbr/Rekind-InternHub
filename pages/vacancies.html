<div class="page" id="page-vacancies">
  <div class="card-header" style="background:var(--white); border-radius:var(--radius) var(--radius) 0 0; padding:20px 24px; border:1px solid var(--border); border-bottom:none; display:flex; justify-content:space-between; align-items:center;">
    <h3 style="font-family:'Syne',sans-serif;font-size:16px;">Daftar Lowongan</h3>
    <button class="btn btn-primary-btn" id="btn-new-vacancy">➕ Buat Lowongan</button>
  </div>
  <div class="table-wrap" style="background:var(--white); border:1px solid var(--border); border-radius:0 0 var(--radius) var(--radius);">
    <table id="vacancies-table">
      <thead>
        <tr>
          <th>Posisi</th>
          <th>Kuota</th>
          <th>Status</th>
          <th>Periode Magang</th>
          <th>Dibuat</th>
          <th>Aksi</th>
        </tr>
      </thead>
      <tbody id="vacancies-body">
        <!-- Injected via JS -->
      </tbody>
    </table>
  </div>
</div>
